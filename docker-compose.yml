version: '3.8'

services:
  timebank:
    build: .
    container_name: plsp-timebank
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}
    restart: unless-stopped
    depends_on:
      - timebank
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
      
